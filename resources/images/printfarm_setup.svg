<svg xmlns="http://www.w3.org/2000/svg" viewBox="4 0 128 60" width="128" height="60">
  <!-- Server monitor (left) -->
  <rect x="8" y="12" width="28" height="22" rx="2.5" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <rect x="11" y="15" width="22" height="15" fill="none" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="22" y1="34" x2="22" y2="40" stroke="#ffffff" stroke-width="2.5"/>
  <line x1="14" y1="40" x2="30" y2="40" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Dashed line from server going right -->
  <line x1="36" y1="23" x2="90" y2="23" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="6,4" stroke-linecap="round"/>
  <!-- Vertical split -->
  <line x1="90" y1="12" x2="90" y2="46" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- Upper branch to client 1 -->
  <line x1="90" y1="12" x2="108" y2="12" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="6,4" stroke-linecap="round"/>
  <!-- Lower branch to client 2 -->
  <line x1="90" y1="46" x2="108" y2="46" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="6,4" stroke-linecap="round"/>
  <!-- Client monitor 1 (top right) -->
  <rect x="108" y="2" width="22" height="17" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="111" y="5" width="16" height="11" fill="none" stroke="#ffffff" stroke-width="1"/>
  <line x1="119" y1="19" x2="119" y2="23" stroke="#ffffff" stroke-width="2"/>
  <line x1="113" y1="23" x2="125" y2="23" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- Client monitor 2 (bottom right) -->
  <rect x="108" y="36" width="22" height="17" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="111" y="39" width="16" height="11" fill="none" stroke="#ffffff" stroke-width="1"/>
  <line x1="119" y1="53" x2="119" y2="57" stroke="#ffffff" stroke-width="2"/>
  <line x1="113" y1="57" x2="125" y2="57" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
</svg>
