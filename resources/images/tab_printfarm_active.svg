<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Monitor (top center) -->
  <rect x="7" y="1" width="10" height="7" rx="1" />
  <line x1="10" y1="5" x2="14" y2="5" />
  <line x1="12" y1="8" x2="12" y2="10" />

  <!-- Connection lines (dashed) -->
  <line x1="8" y1="10" x2="5" y2="13" stroke-dasharray="1.5,1" />
  <line x1="16" y1="10" x2="19" y2="13" stroke-dasharray="1.5,1" />

  <!-- Left printer -->
  <rect x="1" y="13" width="8" height="6" rx="1" />
  <line x1="3" y1="16" x2="7" y2="16" />
  <line x1="5" y1="14.5" x2="5" y2="17.5" />
  <rect x="2.5" y="19" width="5" height="1.5" rx="0.3" />

  <!-- Right printer -->
  <rect x="15" y="13" width="8" height="6" rx="1" />
  <line x1="17" y1="16" x2="21" y2="16" />
  <line x1="19" y1="14.5" x2="19" y2="17.5" />
  <rect x="16.5" y="19" width="5" height="1.5" rx="0.3" />

  <!-- Connection dot -->
  <circle cx="12" cy="10" r="0.8" fill="currentColor" />
</svg>
