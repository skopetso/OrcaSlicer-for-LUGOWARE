<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20">
  <!-- Monitor (top center) -->
  <rect x="5.5" y="1.5" width="9" height="5.5" rx="0.5" style="fill:none;stroke:#fff;stroke-miterlimit:10"/>
  <line x1="8" y1="4.5" x2="12" y2="4.5" style="fill:none;stroke:#fff;stroke-linecap:square;stroke-miterlimit:10"/>
  <line x1="10" y1="7" x2="10" y2="8.5" style="fill:none;stroke:#fff;stroke-linecap:square;stroke-miterlimit:10"/>
  <!-- Connection dot -->
  <rect x="9.25" y="8" width="1.5" height="1.5" style="fill:#fff"/>
  <!-- Connection lines -->
  <line x1="7.5" y1="9" x2="4.5" y2="11.5" style="fill:none;stroke:#fff;stroke-linecap:round;stroke-dasharray:1.5,1"/>
  <line x1="12.5" y1="9" x2="15.5" y2="11.5" style="fill:none;stroke:#fff;stroke-linecap:round;stroke-dasharray:1.5,1"/>
  <!-- Left printer -->
  <rect x="1.5" y="11.5" width="6" height="4.5" rx="0.5" style="fill:none;stroke:#fff;stroke-miterlimit:10"/>
  <line x1="3" y1="14" x2="6" y2="14" style="fill:none;stroke:#fff;stroke-linecap:square;stroke-miterlimit:10"/>
  <line x1="4.5" y1="12.5" x2="4.5" y2="15" style="fill:none;stroke:#fff;stroke-linecap:square;stroke-miterlimit:10"/>
  <rect x="2.5" y="16" width="4" height="1.5" rx="0.3" style="fill:none;stroke:#fff;stroke-miterlimit:10"/>
  <!-- Right printer -->
  <rect x="12.5" y="11.5" width="6" height="4.5" rx="0.5" style="fill:none;stroke:#fff;stroke-miterlimit:10"/>
  <line x1="14" y1="14" x2="17" y2="14" style="fill:none;stroke:#fff;stroke-linecap:square;stroke-miterlimit:10"/>
  <line x1="15.5" y1="12.5" x2="15.5" y2="15" style="fill:none;stroke:#fff;stroke-linecap:square;stroke-miterlimit:10"/>
  <rect x="13.5" y="16" width="4" height="1.5" rx="0.3" style="fill:none;stroke:#fff;stroke-miterlimit:10"/>
</svg>
