<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" width="80" height="64">
  <!-- Dashed line from left, splitting into two branches -->
  <line x1="0" y1="32" x2="20" y2="32" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="6,4" stroke-linecap="round"/>
  <!-- Vertical connector -->
  <line x1="20" y1="16" x2="20" y2="48" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="6,4"/>
  <!-- Upper branch -->
  <line x1="20" y1="16" x2="34" y2="16" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="6,4" stroke-linecap="round"/>
  <!-- Lower branch -->
  <line x1="20" y1="48" x2="34" y2="48" stroke="#ffffff" stroke-width="2.5" stroke-dasharray="6,4" stroke-linecap="round"/>
  <!-- Client monitor 1 (top) -->
  <rect x="34" y="4" width="22" height="17" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="37" y="7" width="16" height="11" fill="none" stroke="#ffffff" stroke-width="1"/>
  <line x1="45" y1="21" x2="45" y2="25" stroke="#ffffff" stroke-width="2"/>
  <line x1="39" y1="25" x2="51" y2="25" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- Client monitor 2 (bottom) -->
  <rect x="34" y="36" width="22" height="17" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
  <rect x="37" y="39" width="16" height="11" fill="none" stroke="#ffffff" stroke-width="1"/>
  <line x1="45" y1="53" x2="45" y2="57" stroke="#ffffff" stroke-width="2"/>
  <line x1="39" y1="57" x2="51" y2="57" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
</svg>
